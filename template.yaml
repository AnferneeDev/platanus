AWSTemplateFormatVersion: "2010-09-09"
Description: Agentic Procurement SaaS - EC2 + EFS + S3/CloudFront

Parameters:
  KeyName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: EC2 SSH key pair name

  InstanceType:
    Type: String
    Default: t3.small
    AllowedValues: [t3.micro, t3.small, t3.medium]
    Description: EC2 instance type

  GooglePlacesApiKey:
    Type: String
    NoEcho: true
    Description: Google Places API key

  DeepSeekApiKey:
    Type: String
    NoEcho: true
    Description: DeepSeek API key

  SessionSecret:
    Type: String
    NoEcho: true
    Default: change-me-in-production
    Description: Session cookie signing secret

Resources:

  # --- VPC & Networking ---

  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: agentic-procurement-vpc

  InternetGateway:
    Type: AWS::EC2::InternetGateway

  VPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  PublicSubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: !Select [0, !GetAZs ""]
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: agentic-public-a

  PublicSubnetB:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.2.0/24
      AvailabilityZone: !Select [1, !GetAZs ""]
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: agentic-public-b

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: VPCGatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  SubnetARouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnetA
      RouteTableId: !Ref PublicRouteTable

  SubnetBRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnetB
      RouteTableId: !Ref PublicRouteTable

  # --- Security Group ---

  EC2SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Agentic Procurement EC2
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 3000
          ToPort: 3000
          CidrIp: 0.0.0.0/0
      SecurityGroupEgress:
        - IpProtocol: "-1"
          CidrIp: 0.0.0.0/0

  EFSSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: EFS mount targets
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 2049
          ToPort: 2049
          SourceSecurityGroupId: !Ref EC2SecurityGroup

  # --- EFS ---

  FileSystem:
    Type: AWS::EFS::FileSystem
    Properties:
      PerformanceMode: generalPurpose
      ThroughputMode: bursting
      Encrypted: true
      Tags:
        - Key: Name
          Value: agentic-procurement-efs

  MountTargetA:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref FileSystem
      SubnetId: !Ref PublicSubnetA
      SecurityGroups: [!Ref EFSSecurityGroup]

  MountTargetB:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref FileSystem
      SubnetId: !Ref PublicSubnetB
      SecurityGroups: [!Ref EFSSecurityGroup]

  # --- IAM Role ---

  EC2Role:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Policies:
        - PolicyName: S3FrontendAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: ["s3:PutObject", "s3:GetObject", "s3:ListBucket"]
                Resource:
                  - !Sub "arn:aws:s3:::${FrontendBucket}"
                  - !Sub "arn:aws:s3:::${FrontendBucket}/*"

  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles: [!Ref EC2Role]

  # --- EC2 Instance ---

  EC2Instance:
    Type: AWS::EC2::Instance
    DependsOn: [MountTargetA]
    Properties:
      InstanceType: !Ref InstanceType
      KeyName: !Ref KeyName
      IamInstanceProfile: !Ref EC2InstanceProfile
      ImageId: !Sub "{{resolve:ssm:/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64}}"
      SubnetId: !Ref PublicSubnetA
      SecurityGroupIds: [!Ref EC2SecurityGroup]
      BlockDeviceMappings:
        - DeviceName: /dev/xvda
          Ebs:
            VolumeSize: 20
            VolumeType: gp3
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          set -ex

          # Mount EFS
          yum install -y amazon-efs-utils
          mkdir -p /data
          mount -t efs ${FileSystem}:/ /data
          echo "${FileSystem}:/ /data efs defaults,_netdev 0 0" >> /etc/fstab
          mkdir -p /data/db /data/sessions

          # Install Node.js 22
          curl -fsSL https://rpm.nodesource.com/setup_22.x | bash -
          yum install -y nodejs git

          # Install Chromium dependencies for whatsapp-web.js
          yum install -y nss atk at-spi2-atk cups-libs libdrm libXcomposite \
            libXdamage libXrandr mesa-libgbm pango alsa-lib

          # Clone and build
          cd /opt
          git clone https://github.com/your-user/agentic-procurement.git app
          cd app
          npm install
          npm run build

          # Build frontend
          cd frontend
          npm install
          npm run build
          cd ..

          # Create .env
          cat > .env << 'ENVEOF'
          GOOGLE_PLACES_API_KEY=${GooglePlacesApiKey}
          DEEPSEEK_API_KEY=${DeepSeekApiKey}
          SESSION_SECRET=${SessionSecret}
          PORT=3000
          NODE_ENV=production
          FRONTEND_URL=https://${CloudFrontDistribution.DomainName}
          ENVEOF

          # Symlink data directories to EFS
          ln -sf /data/db/agentic.db data/agentic.db
          ln -sf /data/sessions .wwebjs_sessions

          # Systemd service
          cat > /etc/systemd/system/agentic.service << 'SVCEOF'
          [Unit]
          Description=Agentic Procurement SaaS
          After=network.target

          [Service]
          Type=simple
          WorkingDirectory=/opt/app
          ExecStart=/usr/bin/node dist/server.js
          Restart=always
          RestartSec=5
          Environment=NODE_ENV=production

          [Install]
          WantedBy=multi-user.target
          SVCEOF

          systemctl daemon-reload
          systemctl enable agentic
          systemctl start agentic

      Tags:
        - Key: Name
          Value: agentic-procurement-server

  # --- S3 Bucket for Frontend ---

  FrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "agentic-procurement-frontend-${AWS::AccountId}"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  FrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FrontendBucket
      PolicyDocument:
        Statement:
          - Sid: AllowCloudFrontOAC
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub "arn:aws:s3:::${FrontendBucket}/*"
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${CloudFrontDistribution}"

  # --- CloudFront ---

  OriginAccessControl:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: agentic-procurement-oac
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        DefaultRootObject: index.html
        Origins:
          # S3 origin for frontend
          - Id: S3Frontend
            DomainName: !GetAtt FrontendBucket.RegionalDomainName
            OriginAccessControlId: !Ref OriginAccessControl
            S3OriginConfig:
              OriginAccessIdentity: ""
          # EC2 origin for API
          - Id: EC2Api
            DomainName: !GetAtt EC2Instance.PublicDnsName
            CustomOriginConfig:
              HTTPPort: 3000
              OriginProtocolPolicy: http-only
        DefaultCacheBehavior:
          TargetOriginId: S3Frontend
          ViewerProtocolPolicy: redirect-to-https
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6  # CachingOptimized
          Compress: true
        CacheBehaviors:
          - PathPattern: /api/*
            TargetOriginId: EC2Api
            ViewerProtocolPolicy: redirect-to-https
            CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad  # CachingDisabled
            OriginRequestPolicyId: 216adef6-5c7f-47e4-b989-5492eafa07d3  # AllViewer
            AllowedMethods: [GET, HEAD, OPTIONS, PUT, PATCH, POST, DELETE]
        CustomErrorResponses:
          - ErrorCode: 403
            ResponsePagePath: /index.html
            ResponseCode: 200
            ErrorCachingMinTTL: 0
          - ErrorCode: 404
            ResponsePagePath: /index.html
            ResponseCode: 200
            ErrorCachingMinTTL: 0

Outputs:
  CloudFrontURL:
    Description: Frontend URL
    Value: !Sub "https://${CloudFrontDistribution.DomainName}"

  EC2PublicIP:
    Description: EC2 public IP for SSH
    Value: !GetAtt EC2Instance.PublicIp

  FrontendBucketName:
    Description: S3 bucket for frontend deployment
    Value: !Ref FrontendBucket

  EFSID:
    Description: EFS filesystem ID
    Value: !Ref FileSystem
